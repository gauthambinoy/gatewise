# Serves the built SPA and proxies the API to the gateway container, so the browser
# only ever sees one origin (no CORS).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + console-auth → the gateway service on the compose network.
    location /v1/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /auth/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else is the SPA; unknown routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
