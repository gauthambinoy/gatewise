name: CD

# Continuous deploy: once CI is green on main, build the gateway + console
# images, push them to GHCR, then roll the live stack over SSH and smoke-test
# the URL. The deploy job stays completely inert until the host secrets and the
# DEPLOY_ENABLED variable are set, so this never fails on a push before the box
# exists. (ROADMAP / CLAUDE.md §6c.)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# A newer run for the same ref cancels the older one.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read the repo, write packages (GHCR). Nothing else.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push images to GHCR
    # workflow_run also fires when CI fails — only proceed on success.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.img.outputs.repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase the image namespace
        id: img
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.repo }}/gateway:latest
            ghcr.io/${{ steps.img.outputs.repo }}/gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push console
        uses: docker/build-push-action@v6
        with:
          context: ./console
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.repo }}/console:latest
            ghcr.io/${{ steps.img.outputs.repo }}/console:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Roll the stack & smoke-test
    needs: build-and-push
    # Inert until the box exists: set the DEPLOY_ENABLED repo variable to 'true'
    # and configure the DEPLOY_* secrets to switch this on.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (pull new images, roll, prune)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/auvex/src
            git pull --ff-only
            cd /opt/auvex/deploy
            export GATEWAY_IMAGE="ghcr.io/${{ needs.build-and-push.outputs.repo }}/gateway:${{ github.sha }}"
            export CONSOLE_IMAGE="ghcr.io/${{ needs.build-and-push.outputs.repo }}/console:${{ github.sha }}"
            docker compose --env-file /opt/auvex/.env -f docker-compose.prod.yml pull gateway console
            docker compose --env-file /opt/auvex/.env -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Smoke-test the live URL
        run: |
          set -euo pipefail
          url="${{ secrets.DEPLOY_URL }}"
          echo "Probing $url ..."
          for i in $(seq 1 10); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$url" || true)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Live site healthy."
              exit 0
            fi
            sleep 15
          done
          echo "Smoke test failed: $url never returned HTTP 200." >&2
          exit 1
