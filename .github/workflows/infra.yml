name: Infra

# Keep the Terraform honest on every PR that touches infra/. This never talks to
# AWS: init runs with -backend=false and validate is offline, so no credentials
# are needed and nothing is provisioned.
on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: only needs to read the repo.
permissions:
  contents: read

jobs:
  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.7

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend, no AWS creds)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate -no-color

      # tflint / tfsec are intentionally not wired here: each needs its own
      # pinned setup action and (for tfsec) tuning to avoid false positives on a
      # deliberately simple single-box demo. fmt + validate are the hard gate; add
      # them later if the IaC grows.
