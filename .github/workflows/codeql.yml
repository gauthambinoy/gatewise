name: CodeQL

# Static application security testing (SAST) for every language in the repo.
# Today that's the JVM backend; the TypeScript console gets added to the matrix
# when Phase 4 lands.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 6 * * 1' # Mondays 06:30 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # required to upload CodeQL results

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          language: ${{ matrix.language }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # CodeQL traces the compiler as it runs, so javac MUST actually execute.
      # --rerun-tasks + --no-build-cache stop Gradle from serving compileJava from
      # the (CI-populated) build cache, which would leave CodeQL with no source to
      # analyse ("no source code seen during build").
      - name: Compile for analysis
        run: ./gradlew :gateway:compileJava :gateway:compileTestJava --no-daemon --rerun-tasks --no-build-cache

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
