version: 2

# Weekly dependency PRs so libraries, actions and base images never go stale.
updates:
  # Gradle dependencies (Spring Boot, plugins, libraries)
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build

  # GitHub Actions used in the workflows above
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # The gateway's container base images
  - package-ecosystem: docker
    directory: "/gateway"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
