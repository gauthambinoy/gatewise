<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GateWise · Policy editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css"></head><body>
<div class="topbar"><a class="back" href="index.html"><i class="ti ti-arrow-left"></i>All screens</a><span class="name">Policy editor</span><span style="font-size:12px;color:var(--color-text-tertiary)">GateWise design</span></div>
<div class="wrap ">

<div style="border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:20px 22px; min-height:460px; background:var(--color-background-primary);">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:2px;"><div style="font-size:18px; font-weight:500;">Edit policy</div><span style="background:var(--color-background-success); color:var(--color-text-success); font-size:12px; padding:4px 10px; border-radius:var(--border-radius-md);">active</span></div>
  <div style="font-size:12px; color:var(--color-text-tertiary); margin-bottom:20px;">redact-PII-external · applies to all external models</div>
  <label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:4px;">Policy name</label>
  <input type="text" value="redact-PII-external" style="width:100%; margin-bottom:16px;">
  <div style="display:flex; gap:12px; margin-bottom:16px;"><div style="flex:1;"><label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:4px;">When data type is</label><select style="width:100%;"><option>Email, card, IBAN, secret</option></select></div><div style="flex:1;"><label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:4px;">And model is</label><select style="width:100%;"><option>Any external provider</option></select></div></div>
  <label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:8px;">Then take action</label>
  <div style="display:flex; gap:10px; margin-bottom:20px;"><div style="flex:1; border:2px solid var(--color-border-info); border-radius:var(--border-radius-md); padding:12px; text-align:center;"><i class="ti ti-eye-off" style="font-size:20px; color:var(--color-text-info);"></i><div style="font-size:13px; font-weight:500; margin-top:4px;">Redact</div></div><div style="flex:1; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); padding:12px; text-align:center;"><i class="ti ti-ban" style="font-size:20px; color:var(--color-text-secondary);"></i><div style="font-size:13px; color:var(--color-text-secondary); margin-top:4px;">Block</div></div><div style="flex:1; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); padding:12px; text-align:center;"><i class="ti ti-check" style="font-size:20px; color:var(--color-text-secondary);"></i><div style="font-size:13px; color:var(--color-text-secondary); margin-top:4px;">Allow</div></div></div>
  <div style="display:flex; align-items:center; gap:8px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px; font-size:12px; color:var(--color-text-secondary); margin-bottom:20px;"><i class="ti ti-info-circle" style="font-size:16px;"></i>If no rule matches, GateWise defaults to the safest option (deny unknown).</div>
  <div style="display:flex; gap:10px;"><button style="padding:11px 22px; font-size:13px; font-weight:500; background:var(--color-text-info); color:var(--color-background-primary); border:none;">Save policy</button><button style="padding:11px 22px; font-size:13px;">Cancel</button></div>
</div>
</div></body></html>
