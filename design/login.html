<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auvex · Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css"></head><body>
<div class="topbar"><a class="back" href="index.html"><i class="ti ti-arrow-left"></i>All screens</a><span class="name">Login</span><span style="font-size:12px;color:var(--color-text-tertiary)">Auvex design</span></div>
<div class="wrap ">

<div style="background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:40px 20px; display:flex; justify-content:center; min-height:440px;">
  <div style="width:340px; background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:28px 26px;">
    <div style="display:flex; align-items:center; gap:9px; justify-content:center; margin-bottom:6px;"><div style="width:30px; height:30px; border-radius:8px; background:var(--color-text-info); display:flex; align-items:center; justify-content:center;"><i class="ti ti-shield-lock" style="font-size:18px; color:var(--color-background-primary);"></i></div><span style="font-size:20px; font-weight:500;">Auvex</span></div>
    <div style="text-align:center; font-size:13px; color:var(--color-text-secondary); margin-bottom:22px;">Sign in to your console</div>
    <button style="width:100%; display:flex; align-items:center; justify-content:center; gap:8px; padding:10px; font-size:13px; margin-bottom:8px;"><i class="ti ti-brand-google" style="font-size:17px;"></i>Continue with Google</button>
    <button style="width:100%; display:flex; align-items:center; justify-content:center; gap:8px; padding:10px; font-size:13px; margin-bottom:16px;"><i class="ti ti-key" style="font-size:17px;"></i>Continue with SSO / Okta</button>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;"><div style="flex:1; height:0.5px; background:var(--color-border-tertiary);"></div><span style="font-size:11px; color:var(--color-text-tertiary);">or email</span><div style="flex:1; height:0.5px; background:var(--color-border-tertiary);"></div></div>
    <label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:4px;">Work email</label>
    <input type="email" placeholder="you@acme.com" style="width:100%; margin-bottom:12px;">
    <label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:4px;">Password</label>
    <input type="password" placeholder="********" style="width:100%; margin-bottom:16px;">
    <button style="width:100%; padding:11px; font-size:13px; font-weight:500; background:var(--color-text-info); color:var(--color-background-primary); border:none;">Sign in</button>
    <div style="text-align:center; font-size:12px; color:var(--color-text-info); margin-top:14px;">Forgot password?</div>
  </div>
</div>
</div></body></html>
