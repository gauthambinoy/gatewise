# Console: nginx serving the React SPA and proxying /v1 + /auth to the gateway.
# The container listens on 80. The image's baked-in nginx.conf proxies to a host
# named "gateway"; we mount gatewise-console-nginx over it so the upstream is the
# in-cluster gatewise-gateway Service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatewise-console
  namespace: gatewise
  labels:
    app.kubernetes.io/part-of: gatewise
    app.kubernetes.io/component: console
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/part-of: gatewise
      app.kubernetes.io/component: console
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: gatewise
        app.kubernetes.io/component: console
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101          # "nginx" user in nginx:alpine
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: console
          image: ghcr.io/gauthambinoy/gatewise-console:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # nginx writes pid/cache to disk, so the root FS stays writable; the
            # writable dirs are scoped to emptyDir mounts below.
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-conf
          configMap:
            name: gatewise-console-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gatewise-console
  namespace: gatewise
  labels:
    app.kubernetes.io/part-of: gatewise
    app.kubernetes.io/component: console
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: gatewise
    app.kubernetes.io/component: console
  ports:
    - name: http
      port: 80
      targetPort: http
