# OPTIONAL — a minimal in-cluster Redis for a quick non-prod spin-up.
# The gateway treats Redis as a fail-open cache, so no persistence and no auth
# here. For production, delete this file and point REDIS_HOST/REDIS_PORT (in
# 10-configmap.yaml) at a managed cache.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatewise-redis
  namespace: gatewise
  labels:
    app.kubernetes.io/part-of: gatewise
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: gatewise
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: gatewise
        app.kubernetes.io/component: redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999          # "redis" user in the official image
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Cache only: no persistence (matches docker-compose).
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gatewise-redis
  namespace: gatewise
  labels:
    app.kubernetes.io/part-of: gatewise
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: gatewise
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
