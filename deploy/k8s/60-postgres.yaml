# OPTIONAL — a minimal in-cluster Postgres for a quick non-prod spin-up.
# For production, delete this file from the kustomization and point
# SPRING_DATASOURCE_URL (in 10-configmap.yaml) at a managed database instead.
#
# It reuses postgres-password from auvex-secrets so the gateway and DB agree on
# the password from a single source.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auvex-postgres-data
  namespace: auvex
  labels:
    app.kubernetes.io/part-of: auvex
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auvex-postgres
  namespace: auvex
  labels:
    app.kubernetes.io/part-of: auvex
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    # A single pod bound to one RWO PVC must not run two copies at once.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/part-of: auvex
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: auvex
        app.kubernetes.io/component: postgres
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999          # "postgres" user in the official image
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: auvex
            - name: POSTGRES_USER
              value: auvex
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auvex-secrets
                  key: postgres-password
            # The official image needs a writable subdir under the mount.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "auvex", "-d", "auvex"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "auvex", "-d", "auvex"]
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: auvex-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: auvex-postgres
  namespace: auvex
  labels:
    app.kubernetes.io/part-of: auvex
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: auvex
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
