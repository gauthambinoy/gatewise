# Public entry point. Routes the host to the console, which serves the SPA and
# reverse-proxies the API to the gateway (single origin, no CORS). cert-manager
# issues the TLS cert via the cluster-issuer annotation.
#
# REPLACE gatewise.example.com with your real DNS name (in both the rule and the
# tls block) and set the issuer to your configured ClusterIssuer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gatewise
  namespace: gatewise
  labels:
    app.kubernetes.io/part-of: gatewise
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - gatewise.example.com
      secretName: gatewise-tls
  rules:
    - host: gatewise.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gatewise-console
                port:
                  number: 80
