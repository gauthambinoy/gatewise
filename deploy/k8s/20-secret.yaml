# =============================================================================
# SECRET TEMPLATE — DO NOT APPLY AS-IS, AND DO NOT COMMIT REAL VALUES.
#
# Replace every <PLACEHOLDER ...> below with real values BEFORE `kubectl apply`.
# `stringData` takes plain (non-base64) strings; Kubernetes base64-encodes them
# for you, so you do not need to encode anything by hand.
#
# Better still, do NOT keep real secrets in this file at all. Create the Secret
# imperatively (it never touches git):
#
#   kubectl -n auvex create secret generic auvex-secrets \
#     --from-literal=openrouter-api-key='sk-or-...' \
#     --from-literal=session-secret="$(openssl rand -hex 32)" \
#     --from-literal=postgres-password="$(openssl rand -hex 16)"
#
# ...or manage it with Sealed Secrets / External Secrets / Vault. If you create
# the Secret another way, DELETE this file from the kustomization resource list.
#
# The same postgres-password value must match the one the postgres Deployment in
# 60-postgres.yaml uses (it reads POSTGRES_PASSWORD from this Secret).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: auvex-secrets
  namespace: auvex
  labels:
    app.kubernetes.io/part-of: auvex
type: Opaque
stringData:
  # Upstream LLM provider key            -> OPENROUTER_API_KEY
  openrouter-api-key: "<PLACEHOLDER replace-with-openrouter-api-key>"
  # Console session signing secret        -> AUVEX_SESSION_SECRET
  # Generate with: openssl rand -hex 32
  session-secret: "<PLACEHOLDER replace-with-32-byte-random-hex>"
  # Database password                     -> SPRING_DATASOURCE_PASSWORD / POSTGRES_PASSWORD
  postgres-password: "<PLACEHOLDER replace-with-db-password>"
