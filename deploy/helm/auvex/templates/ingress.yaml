{{- if .Values.ingress.enabled -}}
{{- $fullName := include "auvex.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "auvex.labels" . | nindent 4 }}
  {{- $ingAnnotations := merge (dict) .Values.ingress.annotations .Values.commonAnnotations }}
  {{- with $ingAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq (default "console" .service) "gateway" }}
                name: {{ include "auvex.gateway.fullname" $ }}
                port:
                  number: {{ $.Values.gateway.service.port }}
                {{- else }}
                name: {{ include "auvex.console.fullname" $ }}
                port:
                  number: {{ $.Values.console.service.port }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
