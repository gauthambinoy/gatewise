apiVersion: v1
kind: Service
metadata:
  name: {{ include "gatewise.console.fullname" . }}
  labels:
    {{- include "gatewise.componentLabels" (dict "ctx" . "component" "console") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.console.service.type }}
  ports:
    - name: http
      port: {{ .Values.console.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "gatewise.componentSelectorLabels" (dict "ctx" . "component" "console") | nindent 4 }}
