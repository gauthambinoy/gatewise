{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "auvex.serviceAccountName" . }}
  labels:
    {{- include "auvex.labels" . | nindent 4 }}
  {{- $saAnnotations := merge (dict) .Values.serviceAccount.annotations .Values.commonAnnotations }}
  {{- with $saAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The workloads make no calls to the Kubernetes API, so the token is not mounted.
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
