{{/*
Chart-managed Secret. It is rendered ONLY when the user has not supplied an
existing Secret name (secrets.existingSecret). When existingSecret is set, this
file produces nothing and the deployments read from that Secret instead — so
real credentials can live in Sealed Secrets / External Secrets / Vault and never
pass through Helm values.

A `required` guard fails the install with a clear message if a chart-managed
Secret is requested but a placeholder was left empty.
*/}}
{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auvex.fullname" . }}
  labels:
    {{- include "auvex.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.secrets.keys.openrouterApiKey }}: {{ required "secrets.openrouterApiKey is required (set it via --set or use secrets.existingSecret). It is intentionally empty by default." .Values.secrets.openrouterApiKey | quote }}
  {{ .Values.secrets.keys.sessionSecret }}: {{ required "secrets.sessionSecret is required (generate with `openssl rand -hex 32`, set via --set, or use secrets.existingSecret)." .Values.secrets.sessionSecret | quote }}
  {{- /* The DB password is only needed when the gateway must authenticate — i.e. bundled Postgres or an external DB that requires a password. */}}
  {{ .Values.secrets.keys.postgresPassword }}: {{ required "secrets.postgresPassword is required (set via --set or use secrets.existingSecret)." .Values.secrets.postgresPassword | quote }}
{{- end }}
