name: gatewise

# One-command local stack: Postgres + Redis + the gateway, every service
# health-gated so `docker compose up --wait` only returns once it's truly up.
# Boots from a clean clone with no extra setup (CLAUDE.md §6d). Values fall back
# to sane local defaults, so it runs without a .env file but honours one if present.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gatewise}
      POSTGRES_USER: ${POSTGRES_USER:-gatewise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gatewise}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes compose interpolation so the shell expands the container's env.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-gatewise} -d $${POSTGRES_DB:-gatewise}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    # No persistence locally — it's a cache; keep it fast and disposable.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      SERVER_PORT: 8080
      # The gateway refuses to boot without an upstream key. For local dev we fall
      # back to an obviously-fake placeholder so the stack still comes up; set a
      # real OPENROUTER_API_KEY (e.g. in .env) before making actual LLM calls.
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-local-dev-placeholder-key}
      # Point the gateway at the postgres service; Flyway migrates on startup.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-gatewise}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-gatewise}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-gatewise}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Seed a sandbox demo tenant so the console's "Try the live demo" button works out of the box.
      GATEWISE_DEMO_ENABLED: "true"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      # Don't start the gateway until its backing services are actually ready.
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  # The React admin console: an nginx image serving the built SPA and proxying the
  # API to the gateway, so the browser sees a single origin (no CORS).
  console:
    build:
      context: ./console
    ports:
      - "${CONSOLE_PORT:-3000}:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1 (not localhost) so busybox wget uses IPv4, where nginx listens.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
