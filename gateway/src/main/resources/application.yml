spring:
  application:
    name: auvex-gateway

# Port is env-overridable so the same image runs unchanged in any environment.
server:
  port: ${SERVER_PORT:8080}

# Actuator exposes a health probe for container and load-balancer checks. Kept
# to health + info only, with no details over HTTP, so nothing sensitive leaks.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

# Upstream LLM provider (OpenRouter — an OpenAI-compatible endpoint). The API key
# has NO default on purpose: the gateway must refuse to start without one rather
# than boot into a silently broken state (enforced by OpenRouterProperties).
auvex:
  openrouter:
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    model: ${OPENROUTER_MODEL:openai/gpt-oss-120b:free}
    api-key: ${OPENROUTER_API_KEY:}
