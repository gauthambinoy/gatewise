# Test-only fixture so the full application context can boot under @SpringBootTest.
# This is NOT a real credential — the gateway just requires *some* key to start,
# and feature tests don't make live provider calls.
auvex.openrouter.api-key=test-key-not-a-real-secret

# Keep the cache off by default in tests so they don't need Redis; the cache test
# turns it on with a Redis container.
auvex.cache.enabled=false

# Budgets off by default so the suite isn't rate-limited; the budget test enables it.
auvex.budget.enabled=false

# Keep a tiny connection pool per test context. Spring caches many contexts across the
# suite (tests with distinct @DynamicPropertySource get their own), and each holds a pool
# against the shared Postgres container — the defaults add up to "too many clients".
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
