# Test-only fixture so the full application context can boot under @SpringBootTest.
# This is NOT a real credential — the gateway just requires *some* key to start,
# and feature tests don't make live provider calls.
auvex.openrouter.api-key=test-key-not-a-real-secret

# Keep the cache off by default in tests so they don't need Redis; the cache test
# turns it on with a Redis container.
auvex.cache.enabled=false
